version: 2
updates:
  # Keep GitHub Actions current; actions are pinned by commit SHA, and Dependabot
  # bumps both the SHA and the version comment.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # NuGet dependencies are centrally managed in Directory.Packages.props.
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
