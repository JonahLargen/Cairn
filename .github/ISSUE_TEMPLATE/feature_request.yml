name: Feature request
description: Suggest an improvement or new capability.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the scenario, not just the proposed API — it helps evaluate alternatives.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Cairn to do? Sketch the API or configuration you have in mind, if any.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you're using today, or other designs you considered.
    validations:
      required: false
