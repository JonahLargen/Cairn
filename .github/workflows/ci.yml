name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # MinVer derives the version from tag history, so the full history is required.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          # The .NET 10 SDK builds every target; the 8.0/9.0 runtimes are needed to run the
          # multi-targeted test projects on their lower TFMs.
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Cairn.slnx

      - name: Build
        run: dotnet build Cairn.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Cairn.slnx --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory coverage

      # Feeds the README coverage badge. Tokenless upload works for public repos;
      # set the CODECOV_TOKEN secret to avoid rate limiting.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          files: coverage/**/coverage.cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      # Keep packaging healthy on every change; the produced preview packages
      # (X.Y.Z-preview.0.N via MinVer) are downloadable from the run for local testing.
      - name: Pack (validate)
        run: dotnet pack Cairn.slnx --configuration Release --no-build --output artifacts

      - name: Upload packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nuget-packages
          path: artifacts/*nupkg

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # DocFX's metadata step builds the projects, which runs MinVer; MinVer warns on a shallow
          # clone and warnings are errors repo-wide, so the docs build needs full tag history too.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Install DocFX
        run: dotnet tool update -g docfx --version 2.78.*

      - name: Build docs
        run: docfx docs/docfx.json
        env:
          DOTNET_NOLOGO: 'true'
