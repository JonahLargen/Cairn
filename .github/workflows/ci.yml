name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Cairn.slnx

      - name: Build
        run: dotnet build Cairn.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Cairn.slnx --configuration Release --no-build --verbosity normal
