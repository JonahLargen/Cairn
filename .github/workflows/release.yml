name: Release

# Releasing is tag-driven (see RELEASING.md): pushing a `vX.Y.Z` tag builds, tests, packs at
# exactly that version (via MinVer), publishes to NuGet.org, and creates the GitHub release.
on:
  push:
    tags: [ 'v*' ]

permissions: {}

jobs:
  release:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    # Write access is scoped to this job rather than the whole workflow
    # (OpenSSF Scorecard Token-Permissions: least privilege at top level).
    permissions:
      contents: write # create the GitHub release
      id-token: write # GitHub OIDC token for NuGet.org Trusted Publishing + Sigstore keyless signing
      attestations: write # store the build provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # MinVer derives the version from tag history, so the full history is required.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          # The .NET 10 SDK builds every target; the 8.0/9.0 runtimes are needed to run the
          # multi-targeted test projects on their lower TFMs.
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Cairn.slnx

      - name: Build
        run: dotnet build Cairn.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Cairn.slnx --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack Cairn.slnx --configuration Release --no-build --output artifacts

      # SLSA build provenance (OpenSSF Scorecard Signed-Releases): a signed in-toto attestation
      # stating that this repo's Release workflow, at this commit, built the exact package bytes
      # below. Signing is keyless (Sigstore, via this run's OIDC identity) and the attestation is
      # stored in GitHub's attestation store — verify with `gh attestation verify` (see RELEASING.md).
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          # Storage records are an organization-repo feature (and need artifact-metadata: write);
          # disable explicitly rather than rely on the default-on behavior skipping gracefully.
          create-storage-record: false

      # Also attach the provenance to the release for offline verification:
      # multiple.intoto.jsonl is the DSSE-wrapped in-toto statement itself;
      # multiple.sigstore.json is the full Sigstore bundle `gh attestation verify --bundle` accepts.
      - name: Stage provenance release assets
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          # -e fails the step if the bundle has no dsseEnvelope, instead of shipping "null".
          jq -ce '.dsseEnvelope' "$BUNDLE_PATH" > artifacts/multiple.intoto.jsonl
          cp "$BUNDLE_PATH" artifacts/multiple.sigstore.json

      # Trusted Publishing: exchange this run's OIDC token for a short-lived (1h) NuGet.org
      # API key — no stored secret to rotate. Requires a trusted publishing policy on
      # nuget.org pointing at this repo + workflow file (see RELEASING.md).
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        # --skip-duplicate makes re-runs idempotent; matching .snupkg symbol packages are
        # pushed automatically alongside each .nupkg.
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $tag already exists; skipping creation."
            exit 0
          fi
          prerelease=""
          case "$tag" in
            *-*) prerelease="--prerelease" ;;
          esac
          gh release create "$tag" artifacts/*.nupkg artifacts/*.snupkg \
            artifacts/multiple.intoto.jsonl artifacts/multiple.sigstore.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --verify-tag \
            --generate-notes \
            $prerelease
