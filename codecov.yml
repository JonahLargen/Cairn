# Strict 95% coverage gates. Codecov counts a partially covered line (a branch
# line where not every direction was taken) as uncovered, so these targets demand
# fully exercised lines. The CI gate in ci.yml enforces the same policy on the
# whole project with the standard metrics: 95% line AND 95% branch coverage via
# ReportGenerator.
#
# - project: the whole codebase must stay at or above 95%.
# - patch: the lines changed by a PR must themselves hit 95% — the canonical
#   Codecov gate, so new code carries its own coverage rather than riding on the
#   project average. Both statuses block the PR.
coverage:
  status:
    project:
      default:
        target: 95%
    patch:
      default:
        target: 95%
